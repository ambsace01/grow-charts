<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Sales Concentration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f6f8;--surface:#fff;--surface2:#f9fafb;--border:#e3e7ed;
    --text-primary:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;
    --accent:#1a73e8;--accent-dim:#e8f0fd;--accent-text:#1a73e8;
    --green:#1e8a4a;--green-bg:#dcfce7;--red:#c0392b;--red-bg:#fee2e2;
    --toggle-bg:#d1d5db;--toggle-knob:#fff;
    --week-active-bg:#1a73e8;--week-active-text:#fff;--week-inactive:#6b7280;
    --shadow:0 1px 6px rgba(0,0,0,.08),0 4px 20px rgba(0,0,0,.04);
    --chart-bg:#f8fafc;--chart-border:#dce3eb;
    --bar-fill:#1a73e8;--bar-dim:rgba(26,115,232,.18);--bar-outline:#0d47a1;
    --line-stroke:#e8a024;--dot-fill:#e8a024;
    --threshold:#c0392b;
    --gridline:rgba(0,0,0,.06);--axis-text:#6b7280;
    --tail-fill:rgba(120,140,160,.16);--tail-border:rgba(120,140,160,.45);--tail-text:#6b7280;
    --gp-sat:72;--gp-light:48;
    --pin-shadow:0 6px 24px rgba(0,0,0,.18);
    --input-bg:#fff;--input-border:#d1d5db;--input-text:#111827;
  }
  [data-theme="dark"] {
    --bg:#0d1117;--surface:#161b27;--surface2:#1e2533;--border:#2e3a4e;
    --text-primary:#e8edf5;--text-secondary:#b0bdd0;--text-muted:#6b7f99;
    --accent:#4f93f5;--accent-dim:#1a2d50;--accent-text:#7db3f8;
    --green:#4ade80;--green-bg:#0c2b1c;--red:#fc8181;--red-bg:#2d1214;
    --toggle-bg:#2e3a4e;--toggle-knob:#e8edf5;
    --week-active-bg:#4f93f5;--week-active-text:#0d1117;--week-inactive:#94a3b8;
    --shadow:0 1px 8px rgba(0,0,0,.5);
    --chart-bg:#0f1520;--chart-border:#1e2a3a;
    --bar-fill:#4f93f5;--bar-dim:rgba(79,147,245,.15);--bar-outline:#cfe3ff;
    --line-stroke:#f59e0b;--dot-fill:#f59e0b;
    --threshold:#fc8181;
    --gridline:rgba(255,255,255,.06);--axis-text:#6b7f99;
    --tail-fill:rgba(180,200,220,.10);--tail-border:rgba(180,200,220,.35);--tail-text:#94a3b8;
    --gp-sat:78;--gp-light:60;
    --pin-shadow:0 6px 24px rgba(0,0,0,.55);
    --input-bg:#1e2533;--input-border:#2e3a4e;--input-text:#e8edf5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text-primary);transition:background .25s,color .25s}
  .widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px 16px;width:100%;height:100%;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:background .25s,border-color .25s;position:relative}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0;gap:12px;flex-wrap:wrap}
  .header-left{display:flex;flex-direction:column;gap:2px;min-width:0}
  .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted)}
  .title{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em}
  .subtitle{font-size:10.5px;color:var(--text-muted);font-weight:500;margin-top:1px}
  .header-right{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
  .ctrl-group{display:flex;flex-direction:column;gap:3px}
  .ctrl-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding-left:4px}
  .view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
  .view-btn{font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--week-inactive);transition:all .16s;font-family:"Inter",sans-serif;white-space:nowrap}
  .view-btn.active{background:var(--week-active-bg);color:var(--week-active-text);box-shadow:0 1px 5px rgba(26,115,232,.3)}
  .search{font-family:"Inter",sans-serif;font-size:11.5px;font-weight:500;padding:6px 10px;border-radius:7px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--input-text);width:160px;outline:none;transition:border-color .15s,box-shadow .15s;align-self:flex-end}
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  .reset-btn{font-size:11px;font-weight:600;padding:6px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:"Inter",sans-serif;white-space:nowrap;align-self:flex-end}
  .reset-btn:hover{background:var(--accent-dim);color:var(--accent-text);border-color:var(--accent)}
  .reset-btn.has-pins{background:var(--accent-dim);color:var(--accent-text);border-color:var(--accent)}
  .dm-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.6;transition:opacity .15s;user-select:none;padding:2px 4px;align-self:center}
  .dm-toggle:hover{opacity:1}
  .dm-icon{font-size:10px;color:var(--text-secondary);display:flex;align-items:center;width:12px;justify-content:center}
  .dm-track{width:28px;height:15px;background:var(--toggle-bg);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0}
  .dm-knob{width:11px;height:11px;background:var(--toggle-knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  [data-theme="dark"] .dm-knob{transform:translateX(13px)}
  .divider{height:1px;background:var(--border);margin-bottom:12px;flex-shrink:0}

  /* GP% range filter row */
  .filter-row{display:flex;align-items:center;gap:14px;padding:0 2px 12px;flex-shrink:0;flex-wrap:wrap}
  .filter-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
  .gp-slider{position:relative;width:280px;height:22px;user-select:none;cursor:pointer;flex-shrink:0}
  .gp-track{position:absolute;top:9px;left:0;right:0;height:6px;border-radius:3px;background:linear-gradient(to right,hsl(0,72%,48%),hsl(45,72%,48%),hsl(130,72%,42%));opacity:.55}
  [data-theme="dark"] .gp-track{background:linear-gradient(to right,hsl(0,78%,60%),hsl(45,78%,60%),hsl(130,78%,55%))}
  .gp-track-active{position:absolute;top:9px;height:6px;background:var(--accent);opacity:.22;border-radius:3px;pointer-events:none}
  .gp-thumb{position:absolute;top:2px;width:16px;height:20px;background:var(--surface);border:2px solid var(--accent);border-radius:4px;cursor:grab;transform:translateX(-50%);box-shadow:0 1px 3px rgba(0,0,0,.25);transition:border-color .12s,box-shadow .12s;z-index:2}
  .gp-thumb:hover{box-shadow:0 0 0 4px var(--accent-dim),0 1px 3px rgba(0,0,0,.25)}
  .gp-thumb.dragging{cursor:grabbing;box-shadow:0 0 0 5px var(--accent-dim),0 1px 3px rgba(0,0,0,.25)}
  .gp-readout{font-size:11px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums;min-width:108px;white-space:nowrap}
  .gp-readout.unbounded{color:var(--text-muted);font-weight:500}
  .filter-hits{font-size:10.5px;color:var(--text-muted);font-weight:500}
  .filter-hits .hits-em{color:var(--text-secondary);font-weight:600}
  .filter-reset{font-size:10px;font-weight:600;color:var(--accent-text);cursor:pointer;padding:3px 7px;border-radius:5px;border:1px solid transparent;transition:all .12s;opacity:0;pointer-events:none}
  .filter-reset.visible{opacity:1;pointer-events:auto}
  .filter-reset:hover{background:var(--accent-dim);border-color:var(--accent)}
  .chart-area{flex:1;min-height:0;background:var(--chart-bg);border:1px solid var(--chart-border);border-radius:8px;padding:12px 16px 8px;position:relative;transition:background .25s,border-color .25s;overflow:hidden}
  canvas{display:block;width:100%;height:100%;cursor:default}
  .chart-stat{position:absolute;top:8px;left:14px;font-size:10.5px;font-weight:600;color:var(--text-secondary);background:var(--chart-bg);padding:2px 6px;border-radius:4px;pointer-events:none;z-index:5;letter-spacing:-.005em}
  .chart-stat .stat-em{color:var(--text-primary);font-weight:700}
  .legend{display:flex;gap:14px;justify-content:flex-end;align-items:center;padding:8px 0 0;flex-shrink:0;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;color:var(--text-muted)}
  .legend-swatch{width:12px;height:3px;border-radius:2px}
  .legend-grad{width:50px;height:8px;border-radius:2px;background:linear-gradient(to right,hsl(0,72%,48%),hsl(45,72%,48%),hsl(130,72%,42%))}
  [data-theme="dark"] .legend-grad{background:linear-gradient(to right,hsl(0,78%,60%),hsl(45,78%,60%),hsl(130,78%,55%))}
  .legend-grad-wrap{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:500;color:var(--text-muted)}
  .legend-grad-wrap .grad-label{font-size:9.5px;color:var(--text-muted)}
  .legend-dot{width:7px;height:7px;border-radius:50%}
  .legend-dash{width:14px;height:0;border-top:2px dashed var(--threshold)}
  .legend-tail{width:12px;height:8px;border-radius:2px;background:var(--tail-fill);border:1px dashed var(--tail-border)}

  /* Info card — shared by hover slot and pinned cards (M4 canonical) */
  .info-card{position:absolute;background:var(--surface);border:1px solid var(--chart-border);border-radius:10px;box-shadow:var(--shadow);z-index:20;opacity:0;pointer-events:none;display:flex;flex-direction:column;transition:opacity .14s,border-color .15s;min-width:200px;min-height:120px}
  .info-card.visible{opacity:1}
  .info-card.pinned{opacity:1;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--pin-shadow);pointer-events:auto;z-index:25}
  .ic-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;background:var(--accent);transition:background .15s;pointer-events:none}
  .ic-head{padding:11px 12px 8px;border-bottom:1px solid var(--chart-border);user-select:none;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .info-card.pinned .ic-head{cursor:move}
  .ic-title{font-size:12px;font-weight:700;color:var(--text-primary);letter-spacing:-.01em;line-height:1.2}
  .ic-sub{font-size:10px;color:var(--text-muted);font-weight:500;margin-top:2px;line-height:1.3}
  .ic-close{cursor:pointer;color:var(--text-muted);font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .12s;font-weight:600;display:none}
  .info-card.pinned .ic-close{display:block}
  .ic-close:hover{background:var(--red-bg);color:var(--red)}
  .ic-body{flex:1;min-height:0;padding:9px 12px 11px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .info-card.pinned .ic-body{cursor:move}
  .ic-row{display:flex;justify-content:space-between;gap:10px;font-size:10.5px;line-height:1.35}
  .ic-key{color:var(--text-muted);font-weight:500}
  .ic-val{font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums}
  .ic-val.green{color:var(--green)}.ic-val.red{color:var(--red)}
  .ic-rank-pill{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;background:var(--accent-dim);color:var(--accent-text);margin-left:5px;vertical-align:1px}

  /* 8-direction resize handles (M4 canonical) */
  .ic-handle{position:absolute;z-index:3}
  .ic-handle-tl{top:-4px;left:-4px;width:10px;height:10px;cursor:nwse-resize}
  .ic-handle-tr{top:-4px;right:-4px;width:10px;height:10px;cursor:nesw-resize}
  .ic-handle-bl{bottom:-4px;left:-4px;width:10px;height:10px;cursor:nesw-resize}
  .ic-handle-br{bottom:-4px;right:-4px;width:14px;height:14px;cursor:nwse-resize;border-right:2px solid var(--text-muted);border-bottom:2px solid var(--text-muted);border-bottom-right-radius:8px;opacity:0;transition:opacity .15s}
  .info-card.pinned:hover .ic-handle-br{opacity:.55}
  .ic-handle-t{top:-3px;left:14px;right:14px;height:6px;cursor:ns-resize}
  .ic-handle-b{bottom:-3px;left:14px;right:14px;height:6px;cursor:ns-resize}
  .ic-handle-l{left:-3px;top:14px;bottom:14px;width:6px;cursor:ew-resize}
  .ic-handle-r{right:-3px;top:14px;bottom:14px;width:6px;cursor:ew-resize}
  .info-card:not(.pinned) .ic-handle{display:none}

  @keyframes pinPulse{0%{box-shadow:0 0 0 0 var(--accent),var(--pin-shadow)}50%{box-shadow:0 0 0 8px transparent,var(--pin-shadow)}100%{box-shadow:0 0 0 1px var(--accent),var(--pin-shadow)}}
  .info-card.pinned.flash{animation:pinPulse .65s ease-out}

  .keyboard-hint{position:absolute;bottom:8px;right:14px;font-size:9.5px;color:var(--text-muted);font-weight:500;pointer-events:none;opacity:.6;font-style:italic}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">ZNVREGEX · Item Pareto</div>
      <div class="title">Item Sales Concentration</div>
      <div class="subtitle" id="periodSub">post-dedup item plane</div>
    </div>
    <div class="header-right">
      <input type="text" class="search" id="search" placeholder="Search item # or desc…" autocomplete="off">
      <div class="ctrl-group">
        <span class="ctrl-label">Period</span>
        <div class="view-toggle" id="periodToggle">
          <button class="view-btn active" data-period="d365" onclick="setPeriod('d365')">365d</button>
          <button class="view-btn" data-period="d90" onclick="setPeriod('d90')">90d</button>
          <button class="view-btn" data-period="d30" onclick="setPeriod('d30')">30d</button>
          <button class="view-btn" data-period="curm" onclick="setPeriod('curm')">This Mo</button>
          <button class="view-btn" data-period="ytd" onclick="setPeriod('ytd')">YTD</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Top N</span>
        <div class="view-toggle" id="topNToggle">
          <button class="view-btn" data-n="25" onclick="setN(25)">25</button>
          <button class="view-btn active" data-n="50" onclick="setN(50)">50</button>
          <button class="view-btn" data-n="100" onclick="setN(100)">100</button>
          <button class="view-btn" data-n="200" onclick="setN(200)">200</button>
          <button class="view-btn" data-n="500" onclick="setN(500)">500</button>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn" onclick="resetAll()">Reset</button>
      <div class="dm-toggle" onclick="toggleDark()">
        <span class="dm-icon">☀</span>
        <div class="dm-track"><div class="dm-knob"></div></div>
        <span class="dm-icon">☽</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="filter-row">
    <span class="filter-label">GP% filter</span>
    <div class="gp-slider" id="gpSlider">
      <div class="gp-track"></div>
      <div class="gp-track-active" id="gpTrackActive"></div>
      <div class="gp-thumb" id="gpThumbLo" data-thumb="lo" style="left:0%"></div>
      <div class="gp-thumb" id="gpThumbHi" data-thumb="hi" style="left:100%"></div>
    </div>
    <span class="gp-readout unbounded" id="gpReadout">All GP%</span>
    <span class="filter-hits" id="filterHits"></span>
    <span class="filter-reset" id="filterReset" onclick="resetGPFilter()">clear</span>
  </div>
  <div class="chart-area" id="chartArea">
    <div class="chart-stat" id="stat"></div>
    <canvas id="canvas"></canvas>
    <div class="keyboard-hint">click bar to pin · esc clears all · drag/resize cards</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--bar-fill)"></div>MDSE Sales</div>
    <div class="legend-grad-wrap"><span class="grad-label">GP%</span><div class="legend-grad"></div><span class="grad-label">low → high</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--line-stroke)"></div>Cumulative %</div>
    <div class="legend-item"><div class="legend-dash"></div>80% threshold</div>
    <div class="legend-item"><div class="legend-tail"></div>Tail rollup</div>
  </div>
</div>

  // Axis titles
  ctx.save();
  ctx.font='600 10px Inter,sans-serif';
  ctx.fillStyle=barFill;
  ctx.textAlign='center';
  ctx.translate(14,plotT+plotH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('MDSE Sales',0,0);
  ctx.restore();

  ctx.save();
  ctx.font='600 10px Inter,sans-serif';
  ctx.fillStyle=lineStroke;
  ctx.textAlign='center';
  ctx.translate(W-10,plotT+plotH/2);
  ctx.rotate(Math.PI/2);
  ctx.fillText('Cumulative % of total',0,0);
  ctx.restore();

  // Hover crosshair (bars only)
  if(hoverIdx>=0&&hoverIdx<n){
    const x=plotL+hoverIdx*slotW+slotW/2;
    ctx.strokeStyle=gridline;
    ctx.lineWidth=1;
    ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,plotT);ctx.lineTo(x,plotB);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Stat strip
  const sumShown=view.reduce((s,a)=>s+A_MDSE(a),0);
  const cumAtN=cumPct.length?cumPct[cumPct.length-1]:0;
  updateStatStrip(n,sumShown,cumAtN,filtTot);
}

function updateStatStrip(n,sumShown,cumAtN,filtTot){
  if(!filtTot)filtTot=filteredTotals();
  const sliceTot=getSlice().total;
  const filterTxt=gpFilterActive()
    ? `<span class="stat-em">${n}</span> of <span class="stat-em">${filtTot.n.toLocaleString()}</span> filtered items · <span class="stat-em">${fmt$(sumShown)}</span> = <span class="stat-em">${cumAtN.toFixed(1)}%</span> of ${fmt$(filtTot.mdse)} filtered total (${(filtTot.mdse/sliceTot.mdse*100).toFixed(1)}% of period)`
    : `Top <span class="stat-em">${n}</span> of <span class="stat-em">${sliceTot.n_items.toLocaleString()}</span> items · <span class="stat-em">${fmt$(sumShown)}</span> = <span class="stat-em">${cumAtN.toFixed(1)}%</span> of ${fmt$(sliceTot.mdse)} total`;
  statEl.innerHTML=filterTxt;
}

function roundedRect(ctx,x,y,w,h,r){
  r=Math.max(0,Math.min(r,h/2,w/2));
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function hitTest(mx,my){
  const filtered=filteredCached();
  const n=Math.min(filtered.length,topN);
  if(n===0)return -2;
  const plotL=PAD.left, plotR=W-PAD.right, plotT=PAD.top, plotB=H-PAD.bottom;
  const tailCount = Math.max(0, filtered.length - topN);
  const showTail = tailCount>0;
  const slotCount = n + (showTail?1:0);
  const slotW=(plotR-plotL)/slotCount;
  if(mx<plotL||mx>plotR||my<plotT-10||my>plotB+10)return-2;
  const idx=Math.floor((mx-plotL)/slotW);
  if(idx>=n) return showTail?-1:-2;
  return Math.max(0,Math.min(n-1,idx));
}

function cardInnerHTML(){
  return '<div class="ic-accent"></div>'+
    '<div class="ic-handle ic-handle-tl" data-corner="tl"></div>'+
    '<div class="ic-handle ic-handle-tr" data-corner="tr"></div>'+
    '<div class="ic-handle ic-handle-bl" data-corner="bl"></div>'+
    '<div class="ic-handle ic-handle-br" data-corner="br"></div>'+
    '<div class="ic-handle ic-handle-t" data-corner="t"></div>'+
    '<div class="ic-handle ic-handle-b" data-corner="b"></div>'+
    '<div class="ic-handle ic-handle-l" data-corner="l"></div>'+
    '<div class="ic-handle ic-handle-r" data-corner="r"></div>'+
    '<div class="ic-head">'+
      '<div style="min-width:0;flex:1">'+
        '<div class="ic-title"></div>'+
        '<div class="ic-sub"></div>'+
      '</div>'+
      '<div class="ic-close">&times;</div>'+
    '</div>'+
    '<div class="ic-body"></div>';
}

function ensureHoverCard(){
  if(hoverEl)return hoverEl;
  hoverEl=document.createElement('div');
  hoverEl.className='info-card';
  hoverEl.setAttribute('data-id','__hover');
  hoverEl.innerHTML=cardInnerHTML();
  chartArea.appendChild(hoverEl);
  return hoverEl;
}

function escHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function populateCard(el,payload){
  const accent=el.querySelector('.ic-accent');
  const titleEl=el.querySelector('.ic-title');
  const subEl=el.querySelector('.ic-sub');
  const body=el.querySelector('.ic-body');

  if(payload.kind==='item'){
    const it=payload.item;
    accent.style.background=gpColor(it.p);
    titleEl.innerHTML=`#${escHTML(it.i)}<span class="ic-rank-pill">rank ${payload.rank}${payload.rankSuffix||''}</span>`;
    subEl.textContent=it.d||'(no description)';
    const gpClass=it.p>=15?'green':(it.p<8?'red':'');
    body.innerHTML=
      `<div class="ic-row"><span class="ic-key">MDSE</span><span class="ic-val">${fmt$Full(it.m)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">GP</span><span class="ic-val">${fmt$Full(it.g)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">GP %</span><span class="ic-val ${gpClass}">${fmtPct(it.p)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Invoices</span><span class="ic-val">${fmtNum(it.n)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Customers</span><span class="ic-val">${fmtNum(it.c)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Cumulative</span><span class="ic-val">${fmtPct(payload.cumPct)}</span></div>`;
  } else {
    accent.style.background=getCSS('--text-muted');
    titleEl.innerHTML=`Tail rollup<span class="ic-rank-pill">${payload.count.toLocaleString()} items</span>`;
    subEl.textContent=gpFilterActive()?`Filtered items beyond top ${topN}`:`Items beyond top ${topN}`;
    const blendedGP=payload.mdse>0?payload.gp/payload.mdse*100:0;
    const gpClass=blendedGP>=15?'green':(blendedGP<8?'red':'');
    const filtTot=filteredTotals();
    body.innerHTML=
      `<div class="ic-row"><span class="ic-key">MDSE (sum)</span><span class="ic-val">${fmt$Full(payload.mdse)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">GP (sum)</span><span class="ic-val">${fmt$Full(payload.gp)}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Blended GP%</span><span class="ic-val ${gpClass}">${payload.mdse>0?fmtPct(blendedGP):'—'}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Avg per item</span><span class="ic-val">${payload.count>0?fmt$(payload.mdse/payload.count):'—'}</span></div>`+
      `<div class="ic-row"><span class="ic-key">Share of ${gpFilterActive()?'filtered':'total'}</span><span class="ic-val">${fmtPct(payload.mdse/filtTot.mdse*100)}</span></div>`;
  }
}

function computeSlot(slotIndex,cardW,cardH){
  const margin=12;
  const gap=10;
  const x=W-cardW-margin;
  const y=margin+slotIndex*(cardH+gap);
  return {x:Math.max(margin,x),y};
}

function showHover(payload){
  const el=ensureHoverCard();
  populateCard(el,payload);
  el.classList.add('visible');
  el.classList.remove('pinned');
  const cw=240, ch=178;
  el.style.width=cw+'px';
  el.style.height=ch+'px';
  const pos=computeSlot(0,cw,ch);
  el.style.left=pos.x+'px';
  el.style.top=pos.y+'px';
}
function hideHover(){if(hoverEl)hoverEl.classList.remove('visible');}

function pinCurrent(payload){
  const key = payload.kind==='item' ? payload.item.i : '__tail__';
  if(pinnedItems.has(key)){
    pinnedItems.get(key).el.remove();
    pinnedItems.delete(key);
    updateResetBtn();
    draw();
    return;
  }
  const el=document.createElement('div');
  el.className='info-card pinned flash';
  el.setAttribute('data-id',key);
  el.innerHTML=cardInnerHTML();
  chartArea.appendChild(el);
  populateCard(el,payload);
  const cw=240, ch=178;
  el.style.width=cw+'px';
  el.style.height=ch+'px';
  const pos=computeSlot(pinnedItems.size+1,cw,ch);
  el.style.left=pos.x+'px';
  el.style.top=pos.y+'px';
  pinnedItems.set(key,{el,payload});
  attachCardHandlers(el,key);
  setTimeout(()=>el.classList.remove('flash'),700);
  updateResetBtn();
  draw();
}

function attachCardHandlers(el,key){
  el.querySelector('.ic-close').addEventListener('click',e=>{
    e.stopPropagation();
    el.remove();
    pinnedItems.delete(key);
    updateResetBtn();
    draw();
  });
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('ic-close'))return;
    e.preventDefault();
    const cr=el.getBoundingClientRect();
    const handle=e.target.closest('.ic-handle');
    const sl=parseInt(el.style.left)||0;
    const st=parseInt(el.style.top)||0;
    const sw=cr.width, sh=cr.height;
    const sx=e.clientX, sy=e.clientY;
    const mW=180, mH=110;
    if(handle){
      const cn=handle.dataset.corner;
      const cm={tl:'nwse-resize',tr:'nesw-resize',bl:'nesw-resize',br:'nwse-resize',t:'ns-resize',b:'ns-resize',l:'ew-resize',r:'ew-resize'};
      const ov=mkOverlay(cm[cn]||'default');
      ov.addEventListener('mousemove',ev=>{
        const dx=ev.clientX-sx, dy=ev.clientY-sy;
        let nw,nh;
        if(cn==='br'){el.style.width=Math.max(mW,sw+dx)+'px';el.style.height=Math.max(mH,sh+dy)+'px';}
        else if(cn==='bl'){nw=Math.max(mW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=Math.max(mH,sh+dy)+'px';}
        else if(cn==='tr'){el.style.width=Math.max(mW,sw+dx)+'px';nh=Math.max(mH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
        else if(cn==='tl'){nw=Math.max(mW,sw-dx);nh=Math.max(mH,sh-dy);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
        else if(cn==='r'){el.style.width=Math.max(mW,sw+dx)+'px';}
        else if(cn==='l'){nw=Math.max(mW,sw-dx);el.style.width=nw+'px';el.style.left=(sl+(sw-nw))+'px';}
        else if(cn==='b'){el.style.height=Math.max(mH,sh+dy)+'px';}
        else if(cn==='t'){nh=Math.max(mH,sh-dy);el.style.height=nh+'px';el.style.top=(st+(sh-nh))+'px';}
      });
      ov.addEventListener('mouseup',()=>ov.remove(),{once:true});
    } else {
      const ov=mkOverlay('move');
      ov.addEventListener('mousemove',ev=>{
        el.style.left=(sl+ev.clientX-sx)+'px';
        el.style.top=(st+ev.clientY-sy)+'px';
      });
      ov.addEventListener('mouseup',()=>ov.remove(),{once:true});
    }
  });
}

function mkOverlay(cursor){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;cursor:'+cursor;
  document.body.appendChild(ov);
  return ov;
}

function clearPins(){
  pinnedItems.forEach(p=>p.el.remove());
  pinnedItems.clear();
  updateResetBtn();
  draw();
}

function updateResetBtn(){
  const n=pinnedItems.size;
  if(n>0){
    resetBtn.classList.add('has-pins');
    resetBtn.textContent=`Reset (${n})`;
  } else {
    resetBtn.classList.remove('has-pins');
    resetBtn.textContent='Reset';
  }
}

function resetAll(){
  searchEl.value='';
  searchQ='';
  gpLo=GP_MIN_BOUND;
  gpHi=GP_MAX_BOUND;
  updateGPUI();
  clearPins();
  hoverIdx=-2;
  hideHover();
  draw();
}

function buildHoverPayload(idx){
  const filtered=filteredCached();
  const view=filtered.slice(0,topN);
  const filtTot=filteredTotals();
  if(idx===-1){
    const t=tailAggregate();
    return {kind:'tail', mdse:t.mdse, gp:t.gp, count:t.count};
  }
  if(idx>=0&&idx<view.length){
    const a=view[idx];
    const it=toObj(a);
    let cum=0;
    for(let i=0;i<=idx;i++)cum+=A_MDSE(view[i]);
    // Rank is within filtered universe
    const rankSuffix = gpFilterActive() ? ' (of filtered)' : '';
    return {kind:'item', item:it, rank:idx+1, rankSuffix, cumPct:cum/filtTot.mdse*100};
  }
  return null;
}

// === Events ===
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const idx=hitTest(mx,my);
  if(idx!==hoverIdx){
    hoverIdx=idx;
    if(idx===-2)hideHover();
    else {
      const p=buildHoverPayload(idx);
      if(p)showHover(p);
    }
    draw();
  }
});
canvas.addEventListener('mouseleave',()=>{
  hoverIdx=-2;
  hideHover();
  draw();
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const idx=hitTest(mx,my);
  if(idx===-2)return;
  const p=buildHoverPayload(idx);
  if(p)pinCurrent(p);
});
canvas.addEventListener('dblclick',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  if(hitTest(mx,my)===-2&&pinnedItems.size>0)clearPins();
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&pinnedItems.size>0)clearPins();
});

searchEl.addEventListener('input',e=>{
  searchQ=e.target.value.trim();
  updateFilterHits();
  draw();
});

// === GP% slider ===
const gpSlider=document.getElementById('gpSlider');
const gpThumbLo=document.getElementById('gpThumbLo');
const gpThumbHi=document.getElementById('gpThumbHi');
const gpTrackActive=document.getElementById('gpTrackActive');
const gpReadout=document.getElementById('gpReadout');
const filterHits=document.getElementById('filterHits');
const filterReset=document.getElementById('filterReset');

function gpPctToLeft(p){return ((p-GP_MIN_BOUND)/(GP_MAX_BOUND-GP_MIN_BOUND))*100;}
function gpLeftToPct(left){return GP_MIN_BOUND+(left/100)*(GP_MAX_BOUND-GP_MIN_BOUND);}

function updateGPUI(){
  gpThumbLo.style.left=gpPctToLeft(gpLo)+'%';
  gpThumbHi.style.left=gpPctToLeft(gpHi)+'%';
  gpTrackActive.style.left=gpPctToLeft(gpLo)+'%';
  gpTrackActive.style.width=(gpPctToLeft(gpHi)-gpPctToLeft(gpLo))+'%';
  if(gpFilterActive()){
    const loTxt = gpLo<=GP_MIN_BOUND ? '−∞' : gpLo.toFixed(1)+'%';
    const hiTxt = gpHi>=GP_MAX_BOUND ? '+∞' : gpHi.toFixed(1)+'%';
    gpReadout.textContent=`${loTxt} – ${hiTxt}`;
    gpReadout.classList.remove('unbounded');
    filterReset.classList.add('visible');
  } else {
    gpReadout.textContent='All GP%';
    gpReadout.classList.add('unbounded');
    filterReset.classList.remove('visible');
  }
  updateFilterHits();
}

function updateFilterHits(){
  if(!gpFilterActive()&&!searchQ){
    filterHits.textContent='';
    return;
  }
  // Hits now reflect filtered + searched counts
  const filtered=filteredCached();
  let hits=0, hitsMdse=0;
  if(searchQ){
    for(const a of filtered){
      const it=toObj(a);
      if(matches(it)){hits++; hitsMdse+=A_MDSE(a);}
    }
    filterHits.innerHTML=`<span class="hits-em">${hits}</span> of ${filtered.length} match search · <span class="hits-em">${fmt$(hitsMdse)}</span>`;
  } else {
    const sliceN=getSlice().total.n_items;
    filterHits.innerHTML=`<span class="hits-em">${filtered.length}</span> of ${sliceN.toLocaleString()} pass filter`;
  }
}

function resetGPFilter(){
  gpLo=GP_MIN_BOUND;
  gpHi=GP_MAX_BOUND;
  updateGPUI();
  draw();
}

function attachThumbDrag(thumb,which){
  thumb.addEventListener('mousedown',e=>{
    e.preventDefault();
    thumb.classList.add('dragging');
    const rect=gpSlider.getBoundingClientRect();
    const ov=mkOverlay('grabbing');
    ov.addEventListener('mousemove',ev=>{
      let x=ev.clientX-rect.left;
      x=Math.max(0,Math.min(rect.width,x));
      const pct=(x/rect.width)*100;
      const gpVal=gpLeftToPct(pct);
      if(which==='lo'){
        gpLo=Math.max(GP_MIN_BOUND,Math.min(gpHi-0.5,gpVal));
      } else {
        gpHi=Math.min(GP_MAX_BOUND,Math.max(gpLo+0.5,gpVal));
      }
      updateGPUI();
      draw();
    });
    ov.addEventListener('mouseup',()=>{
      thumb.classList.remove('dragging');
      ov.remove();
    },{once:true});
  });
}
attachThumbDrag(gpThumbLo,'lo');
attachThumbDrag(gpThumbHi,'hi');

gpSlider.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('gp-thumb'))return;
  const rect=gpSlider.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const pct=(x/rect.width)*100;
  const gpVal=gpLeftToPct(pct);
  const dLo=Math.abs(gpVal-gpLo);
  const dHi=Math.abs(gpVal-gpHi);
  if(dLo<dHi)gpLo=Math.max(GP_MIN_BOUND,Math.min(gpHi-0.5,gpVal));
  else gpHi=Math.min(GP_MAX_BOUND,Math.max(gpLo+0.5,gpVal));
  updateGPUI();
  draw();
});
gpSlider.addEventListener('dblclick',()=>resetGPFilter());

function setN(n){
  topN=n;
  document.querySelectorAll('#topNToggle .view-btn').forEach(b=>{
    b.classList.toggle('active',+b.dataset.n===n);
  });
  hoverIdx=-2;
  hideHover();
  if(pinnedItems.has('__tail__')){
    const p=pinnedItems.get('__tail__');
    const t=tailAggregate();
    const newPayload={kind:'tail', mdse:t.mdse, gp:t.gp, count:t.count};
    p.payload=newPayload;
    populateCard(p.el,newPayload);
  }
  updateFilterHits();
  draw();
}

function setPeriod(p){
  curPeriod=p;
  document.querySelectorAll('#periodToggle .view-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.period===p);
  });
  const sliceMax=SLICES[p].items.length;
  if(topN>sliceMax){
    const presets=[25,50,100,200,500];
    let best=25;
    for(const v of presets) if(v<=sliceMax) best=v;
    topN=best;
    document.querySelectorAll('#topNToggle .view-btn').forEach(b=>{
      b.classList.toggle('active',+b.dataset.n===topN);
    });
  }
  periodSubEl.textContent=SLICES[p].sub+' · post-dedup item plane';
  // Refresh pinned cards for new period
  pinnedItems.forEach((pin,key)=>{
    if(key==='__tail__'){
      const t=tailAggregate();
      const newPayload={kind:'tail', mdse:t.mdse, gp:t.gp, count:t.count};
      pin.payload=newPayload;
      populateCard(pin.el,newPayload);
      pin.el.style.opacity='1';
    } else {
      // Find item in new slice (array-form lookup)
      const newItems=SLICES[curPeriod].items;
      const arrIdx=newItems.findIndex(a=>A_ID(a)===key);
      if(arrIdx>=0){
        const a=newItems[arrIdx];
        const it=toObj(a);
        // Rank within filtered universe
        const filtered=filteredCached();
        const filtIdx=filtered.findIndex(x=>A_ID(x)===key);
        if(filtIdx>=0){
          let cum=0;
          for(let i=0;i<=filtIdx;i++)cum+=A_MDSE(filtered[i]);
          const ft=filteredTotals();
          const rankSuffix = gpFilterActive() ? ' (of filtered)' : '';
          const newPayload={kind:'item',item:it,rank:filtIdx+1,rankSuffix,cumPct:cum/ft.mdse*100};
          pin.payload=newPayload;
          populateCard(pin.el,newPayload);
          pin.el.style.opacity='1';
        } else {
          // Item exists in slice but not in filtered universe
          pin.el.style.opacity='0.5';
        }
      } else {
        pin.el.style.opacity='0.5';
      }
    }
  });
  hoverIdx=-2;
  hideHover();
  updateFilterHits();
  draw();
}

function toggleDark(){
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
  if(hoverEl&&hoverEl.classList.contains('visible')&&hoverIdx!==-2){
    const p=buildHoverPayload(hoverIdx);
    if(p)populateCard(hoverEl,p);
  }
  pinnedItems.forEach(p=>populateCard(p.el,p.payload));
  requestAnimationFrame(draw);
}

function init(){
  dpr=window.devicePixelRatio||1;
  resize();
  periodSubEl.textContent=SLICES[curPeriod].sub+' · post-dedup item plane';
  updateGPUI();
  draw();
}

window.addEventListener('resize',()=>{
  resize();
  if(hoverEl){
    const cw=parseInt(hoverEl.style.width)||240;
    const ch=parseInt(hoverEl.style.height)||178;
    const pos=computeSlot(0,cw,ch);
    hoverEl.style.left=pos.x+'px';
    hoverEl.style.top=pos.y+'px';
  }
  draw();
});
init();
</script>
