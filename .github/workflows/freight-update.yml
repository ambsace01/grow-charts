name: Freight Dashboard Update
on:
  push:
    paths:
      - 'data/HANT-*.XLS'
  workflow_dispatch:
    inputs:
      xls_file:
        description: 'XLS filename in data/ directory'
        required: true
        type: string
jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install openpyxl
          sudo apt-get update && sudo apt-get install -y libreoffice-calc
      - name: Determine XLS file
        id: find-xls
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "xls_file=data/${{ inputs.xls_file }}" >> $GITHUB_OUTPUT
          else
            # Find the most recently added XLS file via git diff
            XLS_FILE=$(git diff --name-only HEAD~1 HEAD -- 'data/HANT-*.XLS' 2>/dev/null | head -1)
            # Fallback: newest HANT file in data/ by filename sort
            if [ -z "$XLS_FILE" ]; then
              XLS_FILE=$(ls -1 data/HANT-*.XLS 2>/dev/null | sort -r | head -1)
            fi
            echo "xls_file=$XLS_FILE" >> $GITHUB_OUTPUT
          fi
      - name: Run freight update
        run: |
          python scripts/freight_update.py "${{ steps.find-xls.outputs.xls_file }}" --widgets-dir .
      - name: Commit and push
        run: |
          git config user.name "Freight Dashboard Bot"
          git config user.email "freight-bot@hantover.com"
          git add *.html
          WEEK=$(echo "${{ steps.find-xls.outputs.xls_file }}" | grep -oP '\d{4}-\d{2}-\d{2}' | sed 's/^20[0-9][0-9]-//' | sed 's/-0/\-/' | sed 's/^0//')
          git commi
